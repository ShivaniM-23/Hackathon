services:
  # ── Backend (FastAPI) ───────────────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: shadowtrace-backend
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=Marri@1234
      - POSTGRES_DB=shadowtrace
      - POSTGRES_HOST=postgres
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=Marri@1234
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=phi3:mini
      - FRONTEND_URL=${APP_URL:-http://localhost:3000}
    volumes:
      - backend_data:/app/data
    depends_on:
      - postgres
      - neo4j
    restart: unless-stopped

  # ── Frontend (Next.js) ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: shadowtrace-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXTAUTH_URL=${APP_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=shadowtrace2024secretkey
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-424986184404-0limb6p8c9rbe01v3kd0vvanc4dl3tdr.apps.googleusercontent.com}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-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}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - backend
    restart: unless-stopped

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: shadowtrace-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Marri@1234
      POSTGRES_DB: shadowtrace
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # ── Neo4j ───────────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5
    container_name: shadowtrace-neo4j
    environment:
      NEO4J_AUTH: neo4j/Marri@1234
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  neo4j_data:
  backend_data:
